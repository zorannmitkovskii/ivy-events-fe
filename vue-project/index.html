<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
          referrerpolicy="no-referrer">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivy Events</title>
    <meta name="description" content="Plan your perfect event with Ivy Events - digital invitations, RSVP tracking, guest management, and more.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#5a7a52">
    <link rel="manifest" href="/manifest.json">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Ivy Events",
          "url": "https://ivyevents.mk",
          "logo": "https://ivyevents.mk/logo.svg",
          "description": "Digital event invitations, RSVP management, and event planning platform.",
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "name": "Ivy Events",
          "url": "https://ivyevents.mk",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://ivyevents.mk/mk/event-invitations?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "name": "Ivy Events",
          "applicationCategory": "LifestyleApplication",
          "operatingSystem": "Web",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "EUR"
          }
        }
      ]
    }
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Ivy Events">
    <meta property="og:title" content="Ivy Events - Digital Event Invitations & Planning">
    <meta property="og:description" content="Create beautiful digital invitations, manage guests, track RSVPs, and plan your perfect event.">
    <meta property="og:image" content="https://ivyevents.mk/logo.svg">
    <meta property="og:url" content="https://ivyevents.mk">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ivy Events - Digital Event Invitations & Planning">
    <meta name="twitter:description" content="Create beautiful digital invitations, manage guests, track RSVPs, and plan your perfect event.">
    <meta name="twitter:image" content="https://ivyevents.mk/logo.svg">

    <!-- Google Analytics — production only (ivyevents.mk) -->
    <script>
        (function() {
            var host = window.location.hostname.toLowerCase();
            if (host !== 'ivyevents.mk') return;
            var s = document.createElement('script');
            s.async = true;
            s.src = 'https://www.googletagmanager.com/gtag/js?id=G-RCSM0NSYSC';
            document.head.appendChild(s);
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-RCSM0NSYSC');
        })();
    </script>
</head>
<body>
<div id="app"></div>
<!-- Load runtime environment variables before the app bootstraps -->
<script src="/public/env.js"></script>
<script type="module" src="/src/main.js"></script>
</body>
</html>
