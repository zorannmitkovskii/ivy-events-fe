<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <!-- White background -->
  <rect width="400" height="600" fill="#fafafa"/>

  <!-- Grid of photo-like rectangles -->
  <rect x="30" y="30" width="160" height="200" rx="8" fill="#e2e8f0"/>
  <rect x="210" y="30" width="160" height="120" rx="8" fill="#fce7f3"/>
  <rect x="210" y="170" width="160" height="120" rx="8" fill="#dbeafe"/>

  <rect x="30" y="250" width="100" height="130" rx="8" fill="#fef3c7"/>
  <rect x="150" y="250" width="100" height="130" rx="8" fill="#d1fae5"/>
  <rect x="270" y="310" width="100" height="70" rx="8" fill="#ede9fe"/>

  <!-- Photo icons inside rectangles -->
  <g opacity="0.3">
    <!-- Mountain icon in first rect -->
    <path d="M60 180 L110 120 L140 160 L160 140 L190 180Z" fill="#94a3b8"/>
    <circle cx="80" cy="80" r="15" fill="#94a3b8"/>

    <!-- Heart in pink rect -->
    <path d="M290 70 Q290 55 275 55 Q260 55 260 70 L290 100 L320 70 Q320 55 305 55 Q290 55 290 70Z" fill="#f9a8d4" opacity="0.5"/>

    <!-- Camera icon in blue rect -->
    <g transform="translate(265, 210)">
      <rect x="0" y="10" width="50" height="35" rx="5" stroke="#93c5fd" stroke-width="2"/>
      <circle cx="25" cy="27" r="10" stroke="#93c5fd" stroke-width="2"/>
      <rect x="15" y="5" width="20" height="8" rx="3" stroke="#93c5fd" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Overlapping accent rectangle -->
  <rect x="270" y="250" width="100" height="50" rx="8" fill="#1f2937" opacity="0.9"/>
  <text x="320" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" letter-spacing="2">COLLAGE</text>

  <!-- Text area -->
  <rect x="30" y="420" width="340" height="150" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="200" y="470" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1f2937">Modern Collage</text>
  <text x="200" y="495" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b7280">Grid Layout Wedding</text>

  <!-- Decorative dots -->
  <circle cx="160" cy="530" r="3" fill="#e5e7eb"/>
  <circle cx="180" cy="530" r="3" fill="#d1d5db"/>
  <circle cx="200" cy="530" r="3" fill="#9ca3af"/>
  <circle cx="220" cy="530" r="3" fill="#d1d5db"/>
  <circle cx="240" cy="530" r="3" fill="#e5e7eb"/>
</svg>
