<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <!-- Deep purple background -->
  <rect width="400" height="600" fill="#4c1d95"/>

  <!-- Gold arabesque pattern -->
  <defs>
    <pattern id="arabesque" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M40 0 Q50 20 40 40 Q30 20 40 0Z" stroke="#fbbf24" stroke-width="0.5" fill="none" opacity="0.2"/>
      <path d="M0 40 Q20 50 40 40 Q20 30 0 40Z" stroke="#fbbf24" stroke-width="0.5" fill="none" opacity="0.2"/>
      <circle cx="40" cy="40" r="2" fill="#fbbf24" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="400" height="600" fill="url(#arabesque)"/>

  <!-- Gold frame -->
  <rect x="30" y="30" width="340" height="540" rx="16" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Ornamental arch at top -->
  <path d="M100 120 Q200 40 300 120" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M120 120 Q200 55 280 120" stroke="#fbbf24" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Central mandala/star -->
  <g transform="translate(200, 260)" opacity="0.6">
    <circle r="60" stroke="#fbbf24" stroke-width="1" fill="none"/>
    <circle r="45" stroke="#fbbf24" stroke-width="0.8" fill="none"/>
    <circle r="30" stroke="#fbbf24" stroke-width="0.5" fill="none"/>
    <!-- Star points -->
    <path d="M0 -60 L5 -20 L0 -15 L-5 -20Z" fill="#fbbf24" opacity="0.4"/>
    <path d="M0 60 L5 20 L0 15 L-5 20Z" fill="#fbbf24" opacity="0.4"/>
    <path d="M-60 0 L-20 5 L-15 0 L-20 -5Z" fill="#fbbf24" opacity="0.4"/>
    <path d="M60 0 L20 5 L15 0 L20 -5Z" fill="#fbbf24" opacity="0.4"/>
    <!-- Diagonal points -->
    <path d="M-42 -42 L-14 -10 L-10 -14Z" fill="#fbbf24" opacity="0.3"/>
    <path d="M42 -42 L14 -10 L10 -14Z" fill="#fbbf24" opacity="0.3"/>
    <path d="M-42 42 L-14 10 L-10 14Z" fill="#fbbf24" opacity="0.3"/>
    <path d="M42 42 L14 10 L10 14Z" fill="#fbbf24" opacity="0.3"/>
    <circle r="8" fill="#fbbf24" opacity="0.5"/>
  </g>

  <!-- Couple silhouette -->
  <g transform="translate(170, 370)" opacity="0.8">
    <circle cx="0" cy="0" r="10" fill="#fbbf24"/>
    <path d="M0 10 L-12 45 L12 45Z" fill="#fbbf24"/>
    <path d="M-12 45 L-20 70 L20 70 L12 45Z" fill="#fbbf24"/>
    <circle cx="30" cy="-2" r="10" fill="#fbbf24"/>
    <path d="M30 8 L18 45 L42 45Z" fill="#fbbf24"/>
    <path d="M18 45 L15 70 L45 70 L42 45Z" fill="#fbbf24"/>
  </g>

  <!-- Gold divider -->
  <line x1="120" y1="470" x2="280" y2="470" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="470" r="3" fill="#fbbf24" opacity="0.6"/>

  <!-- Text -->
  <text x="200" y="510" text-anchor="middle" font-family="serif" font-size="20" font-weight="600" fill="#fbbf24">Persian Wedding</text>
  <text x="200" y="535" text-anchor="middle" font-family="serif" font-size="12" fill="#c4b5fd" opacity="0.8">Glass &amp; Gradient</text>
</svg>
